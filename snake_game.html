<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    #game-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    h1 { font-size: 24px; letter-spacing: 2px; color: #a29bfe; }
    #score-bar {
      display: flex;
      gap: 32px;
      font-size: 14px;
      color: #aaa;
    }
    #score-bar span {
      font-size: 20px;
      font-weight: bold;
      color: #fff;
    }
    canvas {
      border: 2px solid #534AB7;
      border-radius: 8px;
      display: block;
      background: #16213e;
    }
    #msg {
      font-size: 14px;
      color: #aaa;
      text-align: center;
      min-height: 20px;
    }
    #controls { display: flex; gap: 8px; }
    button {
      border: 1px solid #534AB7;
      background: transparent;
      color: #eee;
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #534AB7; }
    #dpad {
      display: grid;
      grid-template-columns: repeat(3, 44px);
      gap: 4px;
      margin-top: 4px;
    }
    #dpad button {
      width: 44px;
      height: 44px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div id="game-wrap">
    <h1>🐍 SNAKE</h1>
    <div id="score-bar">
      Skor: <span id="skor">0</span>
      &nbsp;&nbsp;
      Tertinggi: <span id="best">0</span>
    </div>
    <canvas id="canvas" width="320" height="320"></canvas>
    <div id="msg">Tekan Mulai atau tombol panah untuk main</div>
    <div id="controls">
      <button id="btn-start">Mulai</button>
      <button id="btn-pause">Jeda</button>
    </div>
    <div id="dpad">
      <div></div>
      <button id="d-up">▲</button>
      <div></div>
      <button id="d-left">◀</button>
      <button id="d-down">▼</button>
      <button id="d-right">▶</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const SZ = 16, COLS = 20, ROWS = 20;
    let snake, dir, nextDir, food, score, best = 0, loop, paused = false, running = false;

    function init() {
      snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      placeFood();
      updateScore();
    }

    function placeFood() {
      let pos;
      do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
      } while (snake.some(s => s.x === pos.x && s.y === pos.y));
      food = pos;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Gambar ular
      snake.forEach((s, i) => {
        ctx.fillStyle = i === 0 ? '#a29bfe' : '#534AB7';
        ctx.beginPath();
        ctx.roundRect(s.x * SZ + 1, s.y * SZ + 1, SZ - 2, SZ - 2, i === 0 ? 5 : 3);
        ctx.fill();
        // Mata kepala
        if (i === 0) {
          ctx.fillStyle = '#fff';
          ctx.beginPath(); ctx.arc(s.x * SZ + 5, s.y * SZ + 5, 2, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(s.x * SZ + 11, s.y * SZ + 5, 2, 0, Math.PI * 2); ctx.fill();
        }
      });

      // Gambar makanan
      ctx.fillStyle = '#00b894';
      ctx.beginPath();
      ctx.roundRect(food.x * SZ + 2, food.y * SZ + 2, SZ - 4, SZ - 4, 4);
      ctx.fill();
      ctx.fillStyle = '#55efc4';
      ctx.beginPath();
      ctx.arc(food.x * SZ + SZ / 2, food.y * SZ + 4, 2, 0, Math.PI * 2);
      ctx.fill();
    }

    function step() {
      if (paused) return;
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // Cek tabrakan
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
          snake.some(s => s.x === head.x && s.y === head.y)) {
        gameOver();
        return;
      }

      snake.unshift(head);
      if (head.x === food.x && head.y === food.y) {
        score++;
        if (score > best) best = score;
        updateScore();
        placeFood();
      } else {
        snake.pop();
      }
      draw();
    }

    function updateScore() {
      document.getElementById('skor').textContent = score;
      document.getElementById('best').textContent = best;
    }

    function gameOver() {
      clearInterval(loop);
      running = false;
      document.getElementById('msg').textContent = `Game over! Skor kamu: ${score} 🎉`;
      draw();
    }

    function startGame() {
      clearInterval(loop);
      init();
      running = true;
      paused = false;
      document.getElementById('btn-pause').textContent = 'Jeda';
      document.getElementById('msg').textContent = 'Pakai tombol panah atau D-pad di bawah';
      draw();
      loop = setInterval(step, 250);
    }

    document.getElementById('btn-start').onclick = startGame;
    document.getElementById('btn-pause').onclick = () => {
      if (!running) return;
      paused = !paused;
      document.getElementById('btn-pause').textContent = paused ? 'Lanjut' : 'Jeda';
      document.getElementById('msg').textContent = paused ? 'Dijeda...' : 'Pakai tombol panah atau D-pad di bawah';
    };

    const DIRS = {
      ArrowUp: { x: 0, y: -1 },
      ArrowDown: { x: 0, y: 1 },
      ArrowLeft: { x: -1, y: 0 },
      ArrowRight: { x: 1, y: 0 }
    };

    document.addEventListener('keydown', e => {
      if (DIRS[e.key]) {
        e.preventDefault();
        const d = DIRS[e.key];
        if (d.x === -dir.x && d.y === -dir.y) return;
        nextDir = d;
        if (!running) startGame();
      }
    });

    document.getElementById('d-up').onclick    = () => { if (dir.y ===  1) return; nextDir = { x: 0, y: -1 }; if (!running) startGame(); };
    document.getElementById('d-down').onclick  = () => { if (dir.y === -1) return; nextDir = { x: 0, y:  1 }; if (!running) startGame(); };
    document.getElementById('d-left').onclick  = () => { if (dir.x ===  1) return; nextDir = { x: -1, y: 0 }; if (!running) startGame(); };
    document.getElementById('d-right').onclick = () => { if (dir.x === -1) return; nextDir = { x:  1, y: 0 }; if (!running) startGame(); };

    init();
    draw();
  </script>
</body>
</html>
