<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kuis Reproduksi Wanita</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #f8e6f0 0%, #fdf2f8 100%);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
      color: #2d2d2d;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(180, 80, 140, 0.12);
      padding: 2rem 2.2rem;
      max-width: 680px;
      width: 100%;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #a0306a;
      margin-bottom: 0.4rem;
    }

    .header p {
      font-size: 0.95rem;
      color: #888;
    }

    .progress-bar-bg {
      background: #f3e0ed;
      border-radius: 8px;
      height: 8px;
      margin-bottom: 1.6rem;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #d45fa0, #a0306a);
      border-radius: 8px;
      transition: width 0.4s;
    }

    .question-block {
      margin-bottom: 1.6rem;
      padding: 1.3rem 1.4rem;
      border: 1.5px solid #f0d0e8;
      border-radius: 12px;
      background: #fdf7fb;
      transition: border-color 0.2s;
    }

    .question-block.correct {
      border-color: #52b788;
      background: #f0faf4;
    }

    .question-block.wrong {
      border-color: #e57373;
      background: #fff5f5;
    }

    .question-number {
      font-size: 0.78rem;
      font-weight: 600;
      color: #c05080;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }

    .question-text {
      font-size: 1rem;
      font-weight: 600;
      color: #2d2d2d;
      line-height: 1.55;
      margin-bottom: 1rem;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
    }

    .option-label {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.55rem 0.9rem;
      border-radius: 8px;
      border: 1.5px solid #e8d0e8;
      background: #fff;
      cursor: pointer;
      font-size: 0.95rem;
      color: #333;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }

    .option-label:hover:not(.disabled) {
      background: #fceef6;
      border-color: #d45fa0;
    }

    .option-label input[type="radio"] {
      accent-color: #a0306a;
      width: 17px;
      height: 17px;
      flex-shrink: 0;
    }

    .option-label.option-correct {
      background: #e9f8f0;
      border-color: #52b788;
      color: #1b5e3a;
      font-weight: 600;
    }

    .option-label.option-wrong {
      background: #fde8e8;
      border-color: #e57373;
      color: #8b1a1a;
      font-weight: 600;
    }

    .option-label.disabled {
      cursor: default;
    }

    .feedback {
      margin-top: 0.8rem;
      font-size: 0.9rem;
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      padding: 0.55rem 0.85rem;
      border-radius: 8px;
    }

    .feedback.fb-correct {
      background: #e9f8f0;
      color: #1b5e3a;
    }

    .feedback.fb-wrong {
      background: #fde8e8;
      color: #8b1a1a;
    }

    .feedback-icon {
      font-size: 1rem;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .submit-btn {
      display: block;
      width: 100%;
      margin-top: 0.8rem;
      padding: 0.7rem 1rem;
      background: linear-gradient(90deg, #d45fa0, #a0306a);
      color: #fff;
      font-size: 0.97rem;
      font-weight: 600;
      border: none;
      border-radius: 9px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 0.15s, transform 0.1s;
    }

    .submit-btn:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: default;
      transform: none;
    }

    .divider {
      border: none;
      border-top: 1.5px solid #f0d0e8;
      margin: 2rem 0;
    }

    .score-section {
      display: none;
      text-align: center;
      padding: 1.5rem 0 0.5rem;
    }

    .score-section.visible { display: block; }

    .score-circle {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: linear-gradient(135deg, #d45fa0, #a0306a);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      box-shadow: 0 4px 18px rgba(160, 48, 106, 0.25);
    }

    .score-number {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
    }

    .score-label {
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      opacity: 0.85;
    }

    .score-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #a0306a;
      margin-bottom: 0.3rem;
    }

    .score-desc {
      font-size: 0.92rem;
      color: #888;
      margin-bottom: 1.2rem;
    }

    .reset-btn {
      display: inline-block;
      padding: 0.6rem 1.8rem;
      background: #fff;
      color: #a0306a;
      border: 2px solid #a0306a;
      border-radius: 9px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .reset-btn:hover {
      background: #fceef6;
    }

    @media (max-width: 520px) {
      .container { padding: 1.3rem 1rem; }
      .header h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🩺 Kuis Reproduksi Wanita</h1>
    <p>Jawab 10 soal berikut — hasil & pembahasan langsung tampil setelah kamu menjawab.</p>
  </div>

  <div class="progress-bar-bg">
    <div class="progress-bar" id="progressBar" style="width: 0%"></div>
  </div>

  <div id="quizContainer"></div>

  <hr class="divider" id="scoreDivider" style="display:none;">

  <div class="score-section" id="scoreSection">
    <div class="score-circle">
      <span class="score-number" id="scoreNumber">0</span>
      <span class="score-label">/ 10</span>
    </div>
    <div class="score-title" id="scoreTitle"></div>
    <div class="score-desc" id="scoreDesc"></div>
    <button class="reset-btn" onclick="resetQuiz()">🔄 Ulangi Kuis</button>
  </div>
</div>

<script>
  const questions = [
    {
      q: "Organ reproduksi wanita yang berfungsi menghasilkan sel telur (ovum) adalah...",
      options: ["A. Rahim (uterus)", "B. Tuba falopi", "C. Ovarium", "D. Vagina"],
      answer: 2,
      explanation: "Ovarium (indung telur) adalah organ yang memproduksi dan melepaskan sel telur (ovum) serta hormon reproduksi seperti estrogen dan progesteron."
    },
    {
      q: "Proses pelepasan sel telur dari ovarium disebut...",
      options: ["A. Menstruasi", "B. Fertilisasi", "C. Implantasi", "D. Ovulasi"],
      answer: 3,
      explanation: "Ovulasi adalah proses keluarnya sel telur matang dari ovarium. Biasanya terjadi sekitar hari ke-14 dari siklus menstruasi 28 hari."
    },
    {
      q: "Di mana proses pembuahan (fertilisasi) sel telur oleh sperma umumnya terjadi?",
      options: ["A. Rahim (uterus)", "B. Tuba falopi", "C. Vagina", "D. Serviks"],
      answer: 1,
      explanation: "Fertilisasi umumnya terjadi di tuba falopi (saluran telur), tepatnya di ampulla — bagian terlebar dari tuba falopi."
    },
    {
      q: "Lapisan dalam rahim yang luruh saat menstruasi disebut...",
      options: ["A. Miometrium", "B. Perimetrium", "C. Endometrium", "D. Serviks"],
      answer: 2,
      explanation: "Endometrium adalah lapisan dalam rahim yang menebal setiap bulan untuk mempersiapkan kehamilan. Jika tidak ada pembuahan, lapisan ini luruh dan keluar sebagai darah menstruasi."
    },
    {
      q: "Hormon yang paling berperan dalam mempertahankan kehamilan adalah...",
      options: ["A. Estrogen", "B. Testosteron", "C. Progesteron", "D. FSH"],
      answer: 2,
      explanation: "Progesteron adalah hormon utama yang mempertahankan kehamilan. Hormon ini diproduksi oleh korpus luteum dan kemudian oleh plasenta, berfungsi mencegah kontraksi rahim yang bisa menyebabkan keguguran."
    },
    {
      q: "Siklus menstruasi normal pada wanita berlangsung selama...",
      options: ["A. 7–14 hari", "B. 21–35 hari", "C. 40–50 hari", "D. 14–20 hari"],
      answer: 1,
      explanation: "Siklus menstruasi normal berlangsung antara 21 hingga 35 hari, dengan rata-rata 28 hari. Durasi perdarahan menstruasi sendiri umumnya 3–7 hari."
    },
    {
      q: "Kondisi di mana jaringan seperti endometrium tumbuh di luar rahim disebut...",
      options: ["A. Mioma", "B. Endometriosis", "C. Kista ovarium", "D. PCOS"],
      answer: 1,
      explanation: "Endometriosis adalah kondisi saat jaringan yang mirip dengan lapisan rahim (endometrium) tumbuh di luar rahim, misalnya di ovarium, tuba falopi, atau organ panggul lainnya, menyebabkan nyeri dan infertilitas."
    },
    {
      q: "Fungsi utama serviks (leher rahim) adalah...",
      options: [
        "A. Tempat pematangan sel telur",
        "B. Menghasilkan hormon estrogen",
        "C. Menghubungkan rahim dengan vagina dan menjadi jalur kelahiran bayi",
        "D. Menyimpan cadangan sel telur"
      ],
      answer: 2,
      explanation: "Serviks adalah bagian bawah rahim yang menghubungkan rahim dengan vagina. Fungsinya antara lain sebagai jalur keluarnya darah menstruasi, jalur masuk sperma ke rahim, dan jalur lahir bayi saat persalinan."
    },
    {
      q: "Menopause pada wanita umumnya terjadi pada usia...",
      options: ["A. 30–40 tahun", "B. 40–45 tahun", "C. 45–55 tahun", "D. 60–70 tahun"],
      answer: 2,
      explanation: "Menopause umumnya terjadi pada usia 45–55 tahun, dengan rata-rata usia 51 tahun. Menopause ditandai dengan berhentinya menstruasi selama 12 bulan berturut-turut karena ovarium berhenti memproduksi estrogen."
    },
    {
      q: "Hormon FSH (Follicle-Stimulating Hormone) berperan dalam...",
      options: [
        "A. Merangsang kontraksi rahim saat persalinan",
        "B. Merangsang pertumbuhan folikel di ovarium",
        "C. Menghasilkan ASI (air susu ibu)",
        "D. Menebalkan lapisan vagina"
      ],
      answer: 1,
      explanation: "FSH diproduksi oleh kelenjar pituitari dan berfungsi merangsang pertumbuhan folikel di ovarium. Folikel inilah yang nantinya akan mematangkan sel telur dan melepaskannya saat ovulasi."
    }
  ];

  let answered = 0;

  function buildQuiz() {
    const container = document.getElementById('quizContainer');
    container.innerHTML = '';
    questions.forEach((q, i) => {
      const block = document.createElement('div');
      block.className = 'question-block';
      block.id = `qblock-${i}`;

      const num = document.createElement('div');
      num.className = 'question-number';
      num.textContent = `Soal ${i + 1} dari 10`;

      const text = document.createElement('div');
      text.className = 'question-text';
      text.textContent = q.q;

      const opts = document.createElement('div');
      opts.className = 'options';
      q.options.forEach((opt, j) => {
        const label = document.createElement('label');
        label.className = 'option-label';
        label.id = `opt-${i}-${j}`;
        const radio = document.createElement('input');
        radio.type = 'radio';
        radio.name = `q${i}`;
        radio.value = j;
        label.appendChild(radio);
        label.appendChild(document.createTextNode(opt));
        opts.appendChild(label);
      });

      const btn = document.createElement('button');
      btn.className = 'submit-btn';
      btn.textContent = 'Kirim Jawaban';
      btn.onclick = () => submitAnswer(i, btn);

      block.appendChild(num);
      block.appendChild(text);
      block.appendChild(opts);
      block.appendChild(btn);
      container.appendChild(block);
    });
  }

  function submitAnswer(i, btn) {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    if (!selected) {
      btn.style.animation = 'shake 0.3s';
      setTimeout(() => btn.style.animation = '', 400);
      btn.textContent = '⚠️ Pilih jawaban dulu!';
      setTimeout(() => btn.textContent = 'Kirim Jawaban', 1500);
      return;
    }

    const chosen = parseInt(selected.value);
    const correct = questions[i].answer;
    const isCorrect = chosen === correct;
    const block = document.getElementById(`qblock-${i}`);
    block.classList.add(isCorrect ? 'correct' : 'wrong');

    questions[i].options.forEach((_, j) => {
      const lbl = document.getElementById(`opt-${i}-${j}`);
      lbl.classList.add('disabled');
      lbl.querySelector('input').disabled = true;
      if (j === correct) lbl.classList.add('option-correct');
      else if (j === chosen && !isCorrect) lbl.classList.add('option-wrong');
    });

    const fb = document.createElement('div');
    fb.className = `feedback ${isCorrect ? 'fb-correct' : 'fb-wrong'}`;
    const icon = document.createElement('span');
    icon.className = 'feedback-icon';
    icon.textContent = isCorrect ? '✅' : '❌';
    const msg = document.createElement('span');
    msg.innerHTML = `<strong>${isCorrect ? 'Benar!' : 'Salah.'}</strong> ${questions[i].explanation}`;
    fb.appendChild(icon);
    fb.appendChild(msg);
    block.appendChild(fb);

    btn.disabled = true;
    btn.textContent = isCorrect ? '✅ Jawaban Benar' : '❌ Jawaban Salah';
    btn.style.background = isCorrect ? '#52b788' : '#e57373';

    answered++;
    const progress = (answered / questions.length) * 100;
    document.getElementById('progressBar').style.width = progress + '%';

    if (answered === questions.length) showScore();
  }

  function showScore() {
    let score = 0;
    questions.forEach((q, i) => {
      const checked = document.querySelector(`input[name="q${i}"]:checked`);
      if (checked && parseInt(checked.value) === q.answer) score++;
    });

    document.getElementById('scoreNumber').textContent = score;
    const titles = ['Perlu belajar lebih lagi 📚', 'Lumayan, terus semangat! 💪', 'Bagus! Hampir sempurna 🌟', 'Luar biasa! Nilai sempurna! 🏆'];
    const descs = [
      'Jangan menyerah — ulangi materi reproduksi wanita dan coba lagi.',
      'Kamu sudah cukup paham, tapi masih ada ruang untuk berkembang.',
      'Pengetahuanmu tentang reproduksi wanita sudah sangat baik!',
      'Selamat! Kamu menguasai materi reproduksi wanita dengan sempurna!'
    ];
    const tier = score <= 4 ? 0 : score <= 6 ? 1 : score <= 9 ? 2 : 3;
    document.getElementById('scoreTitle').textContent = titles[tier];
    document.getElementById('scoreDesc').textContent = `Kamu menjawab ${score} dari 10 soal dengan benar. ${descs[tier]}`;

    document.getElementById('scoreDivider').style.display = '';
    document.getElementById('scoreSection').classList.add('visible');
    document.getElementById('scoreSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function resetQuiz() {
    answered = 0;
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('scoreSection').classList.remove('visible');
    document.getElementById('scoreDivider').style.display = 'none';
    buildQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  buildQuiz();
</script>
</body>
</html>
